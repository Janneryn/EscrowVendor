<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Контакты</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    .container {
      max-width: 400px;
      margin: auto;
      padding: 40px 20px;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin-bottom: 15px;
      border: 3px solid #334155;
      animation: fadeIn 1s ease;
    }

    h1 {
      margin: 10px 0 5px;
      font-size: 24px;
      animation: fadeIn 1.2s ease;
    }

    .bio {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 30px;
      animation: fadeIn 1.4s ease;
    }

    .link {
      display: block;
      background: #1e293b;
      margin: 10px 0;
      padding: 15px;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      font-size: 16px;
      transition: all 0.2s ease;
      animation: slideUp 0.5s ease forwards;
    }

    .link:hover {
      background: #334155;
      transform: scale(1.03);
    }

    .footer {
      margin-top: 30px;
      font-size: 12px;
      color: #64748b;
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

  </style>
</head>
<body>

  <div class="container">

    <!-- АВАТАР -->
    <img class="avatar" src="https://via.placeholder.com/100" alt="avatar">

    <!-- ИМЯ -->
    <h1>@yourname</h1>

    <!-- ОПИСАНИЕ -->
    <div class="bio">Связь и резервные контакты</div>

    <!-- КНОПКИ -->
    <a class="link" href="https://t.me/yourname">Telegram (основной)</a>
    <a class="link" href="https://t.me/backupname">Telegram (резерв)</a>
    <a class="link" href="mailto:yourmail@proton.me">Email</a>

    <!-- РЕЗЕРВ -->
    <a class="link" href="https://yourname.github.io">Backup страница</a>

    <!-- ФУТЕР -->
    <div class="footer">
      Если что-то не работает — ищи меня в Telegram
    </div>

  </div>

</body>
</html>
